---
name: Checks

'on':
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    name: Lint (Ubuntu, Node 22)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  test:
    name: Test (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        node:
          - '22'
          - '24'
          - '26'

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile test bundle
        run: npm run compile

      - name: Run tests on Linux
        run: xvfb-run -a npx vscode-test
        if: runner.os == 'Linux'

      - name: Run tests on macOS and Windows
        run: npx vscode-test
        if: runner.os != 'Linux'
